name: Build Executables

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - name: Debug - list files
        run: dir

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure UTF-8 console
        run: chcp 65001

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build executable
        run: |
          pyinstaller --onefile --clean --name AgentRecord --hidden-import=yaml --exclude-module termios --exclude-module tty main.py
          pyinstaller --onefile --clean --noconsole --name AgentRecordBackground --hidden-import=yaml --exclude-module termios --exclude-module tty main.py
          Copy-Item config.yaml dist\config.yaml
          dir dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentRecord-windows
          path: dist/
