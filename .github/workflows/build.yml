name: Build Executables

on:
  workflow_dispatch:

jobs:
  build-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --name AgentRecord \
            --add-data "config.yaml:." \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentRecord-ubuntu
          path: dist/AgentRecord

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name AgentRecord --add-data "config.yaml;." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentRecord-windows
          path: dist/AgentRecord.exe
