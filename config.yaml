# ================= AgentRecord 配置文件 =================
# 模型列表
#   name:     显示名称（人看的）
#   model_id: 请求时的具体模型标识（不填则使用 name）
#   search:   是否有搜索能力（有则在 UI 和日志中标注 SRCH）
models:
  - name: deepseek-v4-pro
    model_id: deepseek-v4-pro
    search: false         # 是否有搜索能力
    api_url: https://api.deepseek.com/chat/completions
    api_key:

# 第三方搜索配置（仅当模型无原生搜索能力时生效）
third_search:
  enabled: false               # 全局开关
  api_url: "https://api.bocha.cn/v1/web-search"
  api_key: ""
  count: 25                    # 单次搜索返回条数
  timeout: 30                  # 请求超时时间（秒）
  max_rounds: 3                # 最大搜索轮数（AI 可多次修正搜索词）

# 日记存储目录
diary_dir: "./Records"

# AI 分析报告目录（与原始日记分开保存）
analysis_dir: "./AnalysisReports"

# 自动任务
# 程序启动后会在后台检查一次，此后跨过零点时处理前一天；
# 若程序中断数日，下次启动会从上次成功日期继续补做。
automation:
  enabled: true
  model: deepseek-v4-pro     # 留空则使用模型列表中的第一个模型
  daily_summary: true       # 自动写入前一日日记顶部 <summary>
  daily_report: true        # 自动生成前一日分析日报
  weekly_report: true       # 每周生成上一完整自然周的分析周报
