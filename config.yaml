# ================= AgentRecord 配置文件 =================
# 模型列表
#   name:     显示名称（人看的）
#   model_id: 请求时的具体模型标识（不填则使用 name）
#   search:   是否有搜索能力（有则在 UI 和日志中标注 SRCH）
models:
  - name: deepseek-v4-pro
    model_id: deepseek-v4-pro
    type: openai          # 请求格式: openai / gemini
    search: false         # 是否有搜索能力
    api_url: https://api.deepseek.com/chat/completions
    api_key:

  - name: gemini-3-flash
    model_id: gemini-3-flash-preview
    type: gemini
    search: true
    api_url: https://xxxxxx/v1beta/models
    api_key:

  - name: gemini-3.1-pro
    model_id: gemini-3.1-pro-preview
    type: gemini
    search: true
    api_url: https://xxxxxx/v1beta/models
    api_key:

# 第三方搜索配置（仅当模型无原生搜索能力时生效）
third_search:
  enabled: false               # 全局开关
  api_url: "https://api.bocha.cn/v1/web-search"
  api_key: ""
  count: 25                    # 单次搜索返回条数
  timeout: 30                  # 请求超时时间（秒）
  max_rounds: 3                # 最大搜索轮数（AI 可多次修正搜索词）

# 日记存储目录
diary_dir: "./Records"
