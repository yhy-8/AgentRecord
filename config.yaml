# ================= AgentRecord 配置文件 =================
# 模型列表
#   name:     显示名称（人看的）
#   model_id: 请求时的具体模型标识（不填则使用 name）
#   search:   是否启用该模型接口提供的原生联网搜索（前提是有原生联网是搜索）
models:
  - name: deepseek-v4-pro
    model_id: deepseek-v4-pro
    search: false         # false 时可按 third_search 配置使用第三方搜索
    json_mode: true       # DeepSeek 官方接口支持 JSON Output
    max_tokens: 32768     # 给长月报留足输出空间，避免 JSON 中途截断
    api_url: https://api.deepseek.com/chat/completions
    api_key:

# 总结、手动报告和自动报告统一使用此模型；/m 会永久更新该项
current_model: "deepseek-v4-pro"

# 第三方搜索配置（仅当模型无原生搜索能力时生效）
third_search:
  enabled: false               # 全局开关
  api_url: "https://api.bocha.cn/v1/web-search"
  api_key: ""
  count: 10                    # 单次搜索最多返回 10 条，避免低相关结果挤占上下文
  timeout: 30                  # 请求超时时间（秒）
  max_rounds: 3                # 最大搜索轮数（只能执行中控已授权的原样查询）

# 日记存储目录
diary_dir: "./Records"

# AI 分析报告目录（与原始日记分开保存）
analysis_dir: "./AnalysisReports"

# 运行诊断日志目录
log_dir: "./Log"

# 自动任务
# 安装系统后台任务后，登录或重启时检查，此后每分钟检查；
# 不检测桌面锁定；系统仍允许运行时照常执行，断网则按网络错误重试。
# 休眠或关机后由下一分钟的小时水位补查；内核锁在进程退出后自动释放。
# 同一输入的内容失败最多自动尝试两次；随后等待输入/模型变化或 /retry。
# 已记录失败不会每分钟反复调用模型，/retry 可按依赖顺序明确重试。
# 自动总结上一自然日、审查并更新人物画像，每天生成信息简报，
# 并生成上一完整自然周和自然月报告。前项失败时不会越过它生成后项。
# 每次只核对昨日/今日与最近一个已闭合周期，不遍历长期关机期间的历史周月。
automation:
  enabled: true
  daily_summary: true       # 自动写入前一日日记顶部 <summary>
  daily_profile: true       # 根据前一日原始记录审查并更新跨周期人物画像
  daily_information: true   # 每日联网收集综合新闻和本周记录的定向信息
  daily_information_time: "08:05"  # 该时间后的首次分钟检查中运行
  weekly_report: true       # 每周生成上一完整自然周的分析周报
  monthly_report: true      # 每月生成上一完整自然月的分析月报
